/**:
  ros__parameters:
    use_sim_time: true

    # Object Detector Parameters
    object_detector:
      # Topic names
      depth_topic: "/camera/depth/image_rect_raw"
      camera_info_topic: "/camera/depth/camera_info"

      # Depth-based segmentation (detects objects at a certain distance)
      depth_min: 0.3 # metres; detect objects closer than this (table surface)
      depth_max: 1.0 # metres; detect objects further than this
      min_contour_area: 500 # pixels² below which contours are ignored

      # Morphological operations (for noise reduction)
      morph_kernel_size: 5 # kernel size for opening/closing operations

      # Depth sampling (for 3D position calculation - used in later steps)
      depth_sample_region: 5 # pixels; N×N region around centroid for depth averaging

      # Frame/axis correction for camera-frame pose output
      output_frame_override: "camera_depth_optical_frame" # force TF-resolvable frame for object pose output
      # axis_order: "zxy" # permutation candidates: xyz, xzy, yxz, yzx, zxy, zyx
      axis_order: "xyz"
      axis_sign_x: 1.0
      # axis_sign_y: -1.0
      axis_sign_y: 1.0
      axis_sign_z: 1.0

    # PCL Object Detector Parameters
    object_detector_pcl:
      cloud_topic: "/camera/depth/color/points"
      publish_debug_clouds: true # publish intermediate clouds for RViz visualization
      depth_min: 0.3 # metres; minimum Z used for point filtering
      depth_max: 1.0 # metres; maximum Z used for point filtering
      voxel_leaf_size: 0.005 # metres; downsampling size
      plane_distance_threshold: 0.01 # metres; RANSAC inlier threshold for table plane
      cluster_tolerance: 0.02 # metres; neighbour distance for Euclidean clustering
      cluster_min_size: 100 # points; ignore smaller clusters
      cluster_max_size: 25000 # points; ignore larger clusters
      output_frame_override: "camera_depth_optical_frame" # published frame for detected pose
      axis_order: "xyz"
      axis_sign_x: 1.0
      axis_sign_y: 1.0
      axis_sign_z: 1.0
      publish_all_cluster_centroids: true # publish centroid pose array for all detected object clusters
      log_all_clusters: true # print per-cluster id, size, and centroid for diagnostics
      enable_target_tracking: true # lock detector to a specific object cluster over time
      target_init_x: 0.04373248 # metres; seeded object centroid X (from debug_all_cluster_centroids)
      target_init_y: 0.12356997 # metres; seeded object centroid Y (from debug_all_cluster_centroids)
      target_init_z: 0.44482085 # metres; seeded object centroid Z (from debug_all_cluster_centroids)
      target_match_max_distance: 0.05 # metres; max centroid distance to consider the same object
      target_prefilter_enabled: true # keep only points near tracked target before clustering
      target_prefilter_radius: 0.08 # metres; local region radius around target
      target_prefilter_min_points: 80 # fallback to full cloud if fewer points than this
      target_fallback_on_no_match: true # if gate misses, use nearest cluster to keep publishing
      target_fallback_max_distance: 0.06 # metres; reject far-off fallback clusters
      target_anchor_to_init: true # prevent drifting away from initial target seed
      target_anchor_max_distance: 0.06 # metres; only accept clusters near initial seed
      target_update_on_fallback: false # avoid updating tracker from fallback selections
      target_reject_large_clusters: true # reject arm-like elongated clusters
      target_max_cluster_extent_x: 0.14 # metres; max allowed selected-cluster span on mapped X
      target_max_cluster_extent_y: 0.14 # metres; max allowed selected-cluster span on mapped Y
      target_max_cluster_extent_z: 0.14 # metres; max allowed selected-cluster span on mapped Z
      target_max_cluster_points: 5000.0 # points; reject very large clusters typically from robot links

    # Pick and Place Executor Parameters
    pick_place_executor:
      arm_group_name: panda_arm
      end_effector_link: panda_hand_tcp
      hand_group_name: hand

      # Phase 5 execution controls
      execute_enabled: true
      execute_pick_only: true

      approach_offset_z: 0.1 # metres above object before descent
      cartesian_step: 0.01 # metres per Cartesian step
      enforce_min_z: true # reject planning targets below min_allowed_z in base frame
      min_allowed_z: 0.0 # metres in panda_link0; table-safe floor
      use_current_ee_orientation_for_pick: false # use detected object orientation for top-down approach
      use_fixed_pick_orientation: true # force fixed top-down quaternion for pick/pre-grasp

      # Fixed pick orientation in panda_link0 (top-down candidate for panda_hand_tcp)
      pick_pose:
        qx: 1.0
        qy: 0.0
        qz: 0.0
        qw: 0.0

      # Fixed place location in panda_link0
      place_pose:
        x: 0.4
        y: -0.3
        z: 0.2
        qx: 0.0
        qy: 0.0
        qz: 0.0
        qw: 1.0

      detection_stability_count: 5 # frames before accepting detection
      detection_stability_dist: 0.02 # metres
