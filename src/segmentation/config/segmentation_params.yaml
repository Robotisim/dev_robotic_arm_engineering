/**:
  ros__parameters:
    # Area thresholds (in pixels^2)
    min_area: 500.0
    max_area: 50000.0

    # Aspect ratio thresholds (width/height)
    min_aspect_ratio: 0.5
    max_aspect_ratio: 2.0

    # Morphological operation kernel size
    morph_kernel_size: 5

    # Enable/disable visualization
    visualization_enabled: true

    # Show debug windows with masks (set to false in production)
    debug_images: false

    # Camera topics (configurable per setup)
    rgb_topic: "/wrist_eye/image_raw"
    depth_topic: "/wrist_eye/depth/image_raw"
    camera_info_topic: "/wrist_eye/depth/camera_info"

    # Phase 2: Depth processing parameters
    # Enable/disable 3D localization using depth camera
    depth_processing_enabled: true

    # Valid depth range (meters)
    depth_min_valid: 0.1
    depth_max_valid: 3.0

    # Radius for median depth sampling (pixels)
    # Larger values = more robust but slower
    depth_sample_radius: 2

    # Phase 3: Coordinate transformation parameters
    # Enable/disable transformation to robot base frame
    transform_enabled: true

    # Target frame for coordinate transformation (robot base frame)
    # Options: "world", "panda_link0" (both are equivalent for this robot)
    target_frame: "panda_link0"

    # Source frame used for deprojection and marker/point cloud frame IDs.
    # This should be an optical frame. If your camera only has a non-optical
    # frame, use launch to publish a static transform to this optical frame.
    source_frame: "camera_optical_frame"

    # Keep false when image headers use non-optical camera frames.
    # Set true only if header.frame_id is already an optical frame.
    use_image_frame: false

    # TF lookup timeout in seconds
    tf_timeout: 0.1
